<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirti | Also Known as Rhea</title>
    <style>
        :root {
            --primary-color: #6a11cb;
            --secondary-color: #2575fc;
            --text-color: #333;
            --bg-color: #f4f4f4;
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--white);
            padding: 3rem 1rem;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        h2 {
            font-size: 1.2rem;
            font-weight: 300;
            margin-top: 10px;
            opacity: 0.9;
        }
        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .card {
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .contact-btn {
            display: inline-block;
            background-color: #25D366; /* WhatsApp/Phone Green */
            color: var(--white);
            padding: 1rem 2rem;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 1rem;
            transition: transform 0.2s;
        }
        .contact-btn:hover {
            transform: scale(1.05);
            background-color: #128C7E;
        }
        footer {
            text-align: center;
            padding: 2rem;
            background: #333;
            color: var(--white);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Kirti</h1>
        <h2>Urf Rhea</h2>
    </header>

    <div class="container">
        <div class="card">
            <h3>About Me</h3>
            <p>Welcome to my personal profile. I am Kirti, also known as Rhea. Feel free to reach out to me for any inquiries.</p>
        </div>

        <div class="card">
            <h3>Contact Me</h3>
            <p>Ready to connect? Call or message me directly.</p>
            <a href="tel:+918474808130" class="contact-btn">
                📞 +91 8474808130
            </a>
        </div>
    </div>

    <footer>
        <p>&copy; 2023 Kirti (Rhea). All rights reserved.</p>
    </footer>

</body>
</html>
